AWSTemplateFormatVersion: "2010-09-09"
Description: >
  業務マップ AI活用 — シンプル構成
  S3 静的ホスティング + Lambda Function URL (プリサインURL生成) のみ

Parameters:
  ProjectName:
    Type: String
    Default: gyomu-map

Resources:

  # ---------- S3: サイトホスティング + アップロードファイル保存 ----------
  GyomuMapBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST, HEAD]
            AllowedOrigins: ["*"]
            MaxAge: 3000

  GyomuMapBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GyomuMapBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${GyomuMapBucket.Arn}/*"

  # ---------- Lambda: プリサインURL生成 + ファイル一覧 ----------
  UploadLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-upload-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt GyomuMapBucket.Arn
                  - !Sub "${GyomuMapBucket.Arn}/uploads/*"

  UploadLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-upload"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt UploadLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          BUCKET_NAME: !Ref GyomuMapBucket
          BUCKET_REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          import json, os, re, boto3
          from datetime import datetime, timezone

          s3 = boto3.client('s3')
          BUCKET = os.environ['BUCKET_NAME']
          REGION = os.environ['BUCKET_REGION']
          SITE = f'http://{BUCKET}.s3-website-{REGION}.amazonaws.com'

          CORS = {
              'Content-Type': 'application/json',
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'GET,POST,OPTIONS',
          }

          def handler(event, context):
              method = event.get('requestContext', {}).get('http', {}).get('method', 'GET')

              if method == 'OPTIONS':
                  return {'statusCode': 204, 'headers': CORS, 'body': ''}

              # GET: アップロード済みファイル一覧
              if method == 'GET':
                  result = s3.list_objects_v2(Bucket=BUCKET, Prefix='uploads/')
                  files = []
                  for item in result.get('Contents', []):
                      key = item['Key']
                      if key.endswith('/'):
                          continue
                      raw = key.replace('uploads/', '', 1)
                      name = re.sub(r'^\d+-', '', raw)
                      files.append({
                          'key': key,
                          'name': name,
                          'url': f'{SITE}/{key}',
                          'uploadedAt': item['LastModified'].isoformat(),
                          'size': item['Size'],
                      })
                  files.sort(key=lambda x: x['uploadedAt'], reverse=True)
                  return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'files': files})}

              # POST: プリサインURL発行
              if method == 'POST':
                  body = json.loads(event.get('body') or '{}')
                  filename = body.get('filename', 'upload.html')
                  content_type = body.get('contentType', 'text/html')
                  ts = int(datetime.now(timezone.utc).timestamp() * 1000)
                  key = f'uploads/{ts}-{filename}'
                  upload_url = s3.generate_presigned_url(
                      'put_object',
                      Params={'Bucket': BUCKET, 'Key': key, 'ContentType': content_type},
                      ExpiresIn=3600,
                  )
                  return {
                      'statusCode': 200,
                      'headers': CORS,
                      'body': json.dumps({
                          'uploadUrl': upload_url,
                          'key': key,
                          'publicUrl': f'{SITE}/{key}',
                      }),
                  }

              return {'statusCode': 405, 'headers': CORS, 'body': json.dumps({'error': 'Method not allowed'})}

  UploadLambdaUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref UploadLambda
      AuthType: NONE
      Cors:
        AllowOrigins: ["*"]
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: ["content-type"]
        MaxAge: 300

  UploadLambdaUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UploadLambda
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

# ---------------------------------------------------------------------------
Outputs:
  WebsiteURL:
    Description: サイトURL（ブラウザ / Teamsタブに貼る）
    Value: !Sub "http://${GyomuMapBucket}.s3-website-${AWS::Region}.amazonaws.com"

  UploadApiUrl:
    Description: Lambda Function URL → 環境変数 NEXT_PUBLIC_UPLOAD_API_URL に設定する
    Value: !GetAtt UploadLambdaUrl.FunctionUrl

  BucketName:
    Description: S3バケット名（npm run build → aws s3 sync out/ s3://<この値>/）
    Value: !Ref GyomuMapBucket
