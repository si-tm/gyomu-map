AWSTemplateFormatVersion: "2010-09-09"
Description: >
  業務マップ AI活用共有サイト — インフラ一式
  構成: S3(ホスティング) + CloudFront + S3(アップロード) + DynamoDB + Lambda + API Gateway

Parameters:
  ProjectName:
    Type: String
    Default: gyomu-map
    Description: リソース名のプレフィックス

  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ---------- S3: 静的サイトホスティング ----------
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-website-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ---------- S3: ファイルアップロード用 ----------
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-uploads-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST, DELETE]
            AllowedOrigins: ["*"]
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          # 未完了マルチパートアップロードを7日後に削除（コスト最適化）
          - Id: CleanupIncompleteMultipart
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # ---------- CloudFront ----------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100   # 北米+欧州+アジア — 最安クラス
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          # Managed-CachingOptimized (キャッシュ最大化)
          CachePolicyId: "658327ea-f89d-4fab-a63d-7e88639e58f6"
        CustomErrorResponses:
          # SPA用: 404→index.html にフォールバック
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ---------- DynamoDB: コメント ----------
  CommentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-comments"
      BillingMode: PAY_PER_REQUEST   # 社内80人規模: 従量課金が最安
      AttributeDefinitions:
        - AttributeName: cellId
          AttributeType: S
        - AttributeName: commentId
          AttributeType: S
      KeySchema:
        - AttributeName: cellId
          KeyType: HASH
        - AttributeName: commentId
          KeyType: RANGE

  # ---------- DynamoDB: リアクション ----------
  ReactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-reactions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cellId
          AttributeType: S
      KeySchema:
        - AttributeName: cellId
          KeyType: HASH

  # ---------- IAM: Lambda実行ロール ----------
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt CommentsTable.Arn
                  - !GetAtt ReactionsTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "${UploadBucket.Arn}/*"

  # ---------- Lambda: API ----------
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-api"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          COMMENTS_TABLE: !Ref CommentsTable
          REACTIONS_TABLE: !Ref ReactionsTable
          UPLOAD_BUCKET: !Ref UploadBucket
          CORS_ORIGIN: !Sub "https://${CloudFrontDistribution.DomainName}"
      # Phase 1 プレースホルダー — 実装は infrastructure/lambda/ に追加予定
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const origin = process.env.CORS_ORIGIN || '*';
            const headers = {
              'Content-Type': 'application/json',
              'Access-Control-Allow-Origin': origin,
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'GET,POST,PUT,DELETE,OPTIONS',
            };
            if (event.requestContext?.http?.method === 'OPTIONS') {
              return { statusCode: 204, headers, body: '' };
            }
            return {
              statusCode: 200,
              headers,
              body: JSON.stringify({ message: 'API placeholder — Phase 2 で実装予定' }),
            };
          };

  # ---------- API Gateway (HTTP API) ----------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowHeaders: ["Content-Type", "Authorization"]
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowOrigins:
          - !Sub "https://${CloudFrontDistribution.DomainName}"
        MaxAge: 300

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: "2.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  WebsiteURL:
    Description: サイトのURL（ブラウザ / Teamsタブに貼る）
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  ApiEndpoint:
    Description: API GatewayのエンドポイントURL（フロントエンドの環境変数 NEXT_PUBLIC_API_URL に設定）
    Value: !GetAtt HttpApi.ApiEndpoint

  WebsiteBucketName:
    Description: フロントエンドデプロイ先（npm run build → aws s3 sync out/ s3://<この値>/）
    Value: !Ref WebsiteBucket

  UploadBucketName:
    Description: ファイルアップロード先S3バケット
    Value: !Ref UploadBucket

  CloudFrontId:
    Description: CloudFront Distribution ID（デプロイ後にキャッシュ無効化で使用）
    Value: !Ref CloudFrontDistribution
