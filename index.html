<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業務マップ | AI活用共有</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .map-cell { cursor: pointer; min-width: 120px; min-height: 72px; transition: filter .15s; }
    .map-cell:hover { filter: brightness(.95); }
    .tab-btn { padding: 12px 16px; font-size: .875rem; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; color: #6b7280; cursor: pointer; white-space: nowrap; }
    .tab-btn.active { border-bottom-color: #3b82f6; color: #2563eb; }
    .tab-btn:hover:not(.active) { color: #374151; }
    .reaction-btn { display:inline-flex; align-items:center; gap:6px; font-size:.75rem; padding:6px 12px; border-radius:9999px; border-width:1px; font-weight:500; cursor:pointer; transition:background-color .15s; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-gray-900">業務マップ</h1>
        <p class="text-xs text-gray-500 mt-0.5">各セルをクリックして AI 活用のアイデアを確認・投稿できます</p>
      </div>
      <a href="resources.html" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors" style="text-decoration:none;">
        📎 AI活用事例・手順書
      </a>
    </div>
  </header>

  <!-- Map -->
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6 py-6">
    <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm bg-white">
      <table id="mapTable" class="w-full border-collapse" style="min-width:720px;">
        <thead id="mapHead"></thead>
        <tbody id="mapBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
       style="background:rgba(0,0,0,.4);backdrop-filter:blur(4px);">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col" style="max-height:85vh;">
      <!-- Modal header -->
      <div class="flex items-start justify-between px-6 pt-5 pb-4 border-b border-gray-200 shrink-0">
        <div>
          <p id="modalBreadcrumb" class="text-xs text-gray-400 mb-0.5"></p>
          <h2 class="text-lg font-bold text-gray-900">AI活用アイデア</h2>
        </div>
        <button onclick="closeModal()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 text-lg leading-none">✕</button>
      </div>
      <!-- AI Summary -->
      <div id="modalSummary" class="hidden mx-6 mt-4 px-4 py-3 bg-blue-50 border border-blue-100 rounded-xl text-sm text-blue-800 shrink-0"></div>
      <!-- Reactions -->
      <div class="flex flex-wrap gap-2 px-6 py-3 shrink-0">
        <button onclick="addReaction('idea')" class="reaction-btn" style="border-color:#fde68a;background:#fefce8;color:#92400e;">💡 アイデア！ <span id="r-idea"></span></button>
        <button onclick="addReaction('good')" class="reaction-btn" style="border-color:#bfdbfe;background:#eff6ff;color:#1e40af;">👍 参考になった <span id="r-good"></span></button>
        <button onclick="addReaction('want')" class="reaction-btn" style="border-color:#e9d5ff;background:#f5f3ff;color:#6d28d9;">⭐ やってみたい <span id="r-want"></span></button>
      </div>
      <!-- Tabs -->
      <div class="flex border-b border-gray-200 px-6 shrink-0 overflow-x-auto" id="modalTabs"></div>
      <!-- Content -->
      <div class="flex-1 overflow-y-auto px-6 py-4" id="modalContent"></div>
    </div>
  </div>

  <footer class="text-center text-xs text-gray-400 py-6">
    業務マップ AI活用共有サイト — データは <code class="bg-gray-100 px-1 rounded">data/businessMap.json</code> で管理
  </footer>

<script>
// 行ごとの色定義（インラインスタイルで確実に適用）
const ROW_COLORS = {
  'tama-kanshi':   { header: '#2563eb', bg: '#eff6ff', text: '#1d4ed8' },
  'gyomu-chosa':   { header: '#059669', bg: '#ecfdf5', text: '#065f46' },
  'unyo-sagyo':    { header: '#d97706', bg: '#fffbeb', text: '#92400e' },
  'naibu-gyomu':   { header: '#7c3aed', bg: '#f5f3ff', text: '#5b21b6' },
};

let mapData = null;
let currentCellId = null;
let activeTab = 'tasks';

// ---- Data ----
async function init() {
  try {
    const res = await fetch('data/businessMap.json');
    mapData = await res.json();
    renderMap();
  } catch {
    document.getElementById('mapBody').innerHTML =
      '<tr><td colspan="10" class="text-center text-red-400 p-8">data/businessMap.json の読み込みに失敗しました</td></tr>';
  }
}

function cellKey(rowId, colId) { return `${rowId}__${colId}`; }
function localComments(cellId) { return JSON.parse(localStorage.getItem(`c__${cellId}`) || '[]'); }
function localReactions(cellId) {
  const base = mapData?.cells?.[cellId]?.reactions || { idea:0, good:0, want:0 };
  const add  = JSON.parse(localStorage.getItem(`r__${cellId}`) || '{}');
  return { idea:(base.idea||0)+(add.idea||0), good:(base.good||0)+(add.good||0), want:(base.want||0)+(add.want||0) };
}

// ---- Map rendering ----
function renderMap() {
  // head
  let h = '<tr><th class="border-b border-r border-gray-200 bg-gray-50" style="min-width:7rem;"></th>';
  for (const col of mapData.columns)
    h += `<th class="border-b border-r border-gray-200 bg-gray-50 px-3 py-3 text-xs font-semibold text-gray-600 text-center last:border-r-0">${esc(col.label)}</th>`;
  document.getElementById('mapHead').innerHTML = h + '</tr>';

  // body
  let b = '';
  mapData.rows.forEach((row, ri) => {
    const c = ROW_COLORS[row.id] || ROW_COLORS['naibu-gyomu'];
    b += `<tr class="${ri < mapData.rows.length-1 ? 'border-b border-gray-200' : ''}">`;
    b += `<td class="border-r border-gray-200 px-3 py-3 text-center text-sm font-bold text-white"
              style="background:${c.header}">${esc(row.label)}</td>`;
    mapData.columns.forEach((col, ci) => {
      const id   = cellKey(row.id, col.id);
      const cell = mapData.cells?.[id];
      const lc   = localComments(id);
      const cc   = (cell?.comments?.length||0) + lc.length;
      const ac   = cell?.attachments?.length||0;
      const tc   = cell?.tasks?.length||0;
      const rx   = localReactions(id);
      const rxN  = rx.idea+rx.good+rx.want;
      const hasCont = tc>0||cc>0||ac>0;
      const bgStyle = hasCont ? `background:${c.bg}` : '';
      b += `<td class="map-cell border-r border-gray-100 ${ci===mapData.columns.length-1?'border-r-0':''} align-top p-2"
                style="${bgStyle}" onclick="openModal('${row.id}','${col.id}')">`;
      (cell?.tasks||[]).forEach(t => {
        b += `<p class="text-xs leading-snug mb-1 font-medium" style="color:${c.text}">· ${esc(t.label)}</p>`;
      });
      b += '<div class="flex flex-wrap gap-1 mt-1">';
      if (cc>0)  b += `<span class="text-xs bg-blue-100 text-blue-700 rounded px-1.5 py-0.5">💬 ${cc}</span>`;
      if (ac>0)  b += `<span class="text-xs bg-green-100 text-green-700 rounded px-1.5 py-0.5">📎 ${ac}</span>`;
      if (rxN>0) b += `<span class="text-xs bg-yellow-100 text-yellow-700 rounded px-1.5 py-0.5">✨ ${rxN}</span>`;
      b += '</div></td>';
    });
    b += '</tr>';
  });
  document.getElementById('mapBody').innerHTML = b;
}

// ---- Modal ----
function openModal(rowId, colId) {
  currentCellId = cellKey(rowId, colId);
  const row = mapData.rows.find(r => r.id === rowId);
  const col = mapData.columns.find(c => c.id === colId);
  document.getElementById('modalBreadcrumb').textContent = `${row.label} › ${col.label}`;
  const cell = mapData.cells?.[currentCellId];
  const sumEl = document.getElementById('modalSummary');
  if (cell?.aiSummary) {
    sumEl.classList.remove('hidden');
    sumEl.innerHTML = `<span class="font-semibold">AI まとめ:</span> ${esc(cell.aiSummary)}`;
  } else {
    sumEl.classList.add('hidden');
  }
  updateReactions();
  activeTab = 'tasks';
  renderTabs();
  renderContent();
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  renderMap();
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function updateReactions() {
  const r = localReactions(currentCellId);
  ['idea','good','want'].forEach(k => {
    document.getElementById(`r-${k}`).textContent = r[k] > 0 ? r[k] : '';
  });
}

function addReaction(type) {
  const r = JSON.parse(localStorage.getItem(`r__${currentCellId}`) || '{}');
  r[type] = (r[type]||0) + 1;
  localStorage.setItem(`r__${currentCellId}`, JSON.stringify(r));
  updateReactions();
  renderMap();
}

// ---- Tabs ----
function renderTabs() {
  const cell = mapData.cells?.[currentCellId];
  const lc   = localComments(currentCellId);
  const tabs = [
    { key:'tasks',       label:'業務内容',       count: cell?.tasks?.length||0 },
    { key:'comments',    label:'AI活用アイデア', count: (cell?.comments?.length||0)+lc.length },
    { key:'attachments', label:'添付ファイル',   count: cell?.attachments?.length||0 },
  ];
  document.getElementById('modalTabs').innerHTML = tabs.map(t =>
    `<button class="tab-btn ${activeTab===t.key?'active':''}" onclick="switchTab('${t.key}')">
       ${esc(t.label)}${t.count>0?`<span class="ml-1 text-xs bg-gray-100 text-gray-600 rounded-full px-1.5 py-0.5">${t.count}</span>`:''}
     </button>`
  ).join('');
}

function switchTab(tab) { activeTab = tab; renderTabs(); renderContent(); }

function renderContent() {
  const cell = mapData.cells?.[currentCellId];
  const el = document.getElementById('modalContent');

  if (activeTab === 'tasks') {
    const tasks = cell?.tasks||[];
    el.innerHTML = tasks.length === 0
      ? `<p class="text-sm text-gray-400 text-center py-10">業務内容はまだ登録されていません<br><span class="text-xs">businessMap.json の tasks に追加してください</span></p>`
      : `<ul class="space-y-2">${tasks.map(t=>`
          <li class="flex items-start gap-2 p-3 bg-gray-50 rounded-lg">
            <span class="text-gray-300 mt-0.5 shrink-0">●</span>
            <div><p class="text-sm text-gray-800">${esc(t.label)}</p>
            ${t.owner?`<p class="text-xs text-gray-400 mt-0.5">担当: ${esc(t.owner)}</p>`:''}</div>
          </li>`).join('')}</ul>`;
    return;
  }

  if (activeTab === 'comments') {
    const saved = cell?.comments||[];
    const local = localComments(currentCellId);
    const all   = [...saved, ...local];
    let html = all.length === 0
      ? `<p class="text-sm text-gray-400 text-center py-6">まだアイデアがありません。最初の一件を投稿しましょう！</p>`
      : `<ul class="space-y-3 mb-4">${all.map(c=>`
          <li class="p-3 bg-blue-50 rounded-xl">
            <div class="flex justify-between mb-1">
              <span class="text-xs font-semibold text-blue-700">${esc(c.author)}</span>
              <span class="text-xs text-gray-400">${fmtDate(c.createdAt)}</span>
            </div>
            <p class="text-sm text-gray-800 leading-relaxed">${esc(c.content)}</p>
          </li>`).join('')}</ul>`;
    html += `<div class="border-t pt-4">
      <textarea id="ci" rows="3" placeholder="AI活用のアイデアや気づきを入力… (Ctrl+Enter で投稿)"
        class="w-full border border-gray-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-300"
        onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')postComment()"></textarea>
      <button onclick="postComment()" class="mt-2 px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition-colors">投稿する</button>
    </div>`;
    el.innerHTML = html;
    return;
  }

  if (activeTab === 'attachments') {
    const atts = cell?.attachments||[];
    let html = atts.length === 0
      ? `<p class="text-sm text-gray-400 text-center py-6">添付ファイルはまだありません</p>`
      : `<ul class="space-y-2 mb-4">${atts.map(f=>`
          <li class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50">
            <span class="text-2xl">${f.type==='html'?'🌐':f.type==='pdf'?'📕':'📄'}</span>
            <div class="flex-1 min-w-0">
              <a href="${escA(f.url)}" target="_blank" class="text-sm font-medium text-blue-600 hover:underline truncate block">${esc(f.name)}</a>
              <p class="text-xs text-gray-400">${fmtDate(f.uploadedAt)}</p>
            </div>
          </li>`).join('')}</ul>`;
    html += `<a href="resources.html" class="flex items-center justify-center gap-2 w-full py-3 border-2 border-dashed border-blue-200 rounded-xl text-sm text-blue-600 hover:bg-blue-50 hover:border-blue-400 transition-colors" style="text-decoration:none;">
      🔗 AI活用事例・手順書ページで HTML をアップロード
    </a>`;
    el.innerHTML = html;
  }
}

function postComment() {
  const input = document.getElementById('ci');
  const text = input?.value?.trim();
  if (!text) return;
  const comments = localComments(currentCellId);
  comments.push({ content: text, author: '自分', createdAt: new Date().toISOString() });
  localStorage.setItem(`c__${currentCellId}`, JSON.stringify(comments));
  input.value = '';
  renderTabs();
  renderContent();
  renderMap();
}

// ---- Utils ----
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s).replace(/"/g,'&quot;'); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('ja-JP',{year:'numeric',month:'short',day:'numeric'}); }

init();
</script>
</body>
</html>
